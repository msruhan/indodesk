name: Release & Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 0.1.0 or latest)'
        required: true
        default: 'latest'
      deploy:
        description: 'Deploy to production VPS after push'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/msruhan/bantoo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

  deploy-production:
    needs: build-and-push
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure VPS install directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/indoteknizi/deploy
            sudo chown -R "${USER}:${USER}" /opt/indoteknizi

      - name: Sync compose and prisma config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.production.yml,prisma.config.ts"
          target: "/opt/indoteknizi"
          overwrite: true

      - name: Sync deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/vps-deploy.sh"
          target: "/opt/indoteknizi/deploy"
          overwrite: true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${{ needs.build-and-push.outputs.image }}"
            INSTALL_DIR="/opt/indoteknizi"

            if [[ -n "${{ secrets.GHCR_READ_TOKEN }}" ]]; then
              echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            run_root() {
              if [[ "$(id -u)" -eq 0 ]]; then
                "$@"
              else
                sudo "$@"
              fi
            }

            run_root mkdir -p "$INSTALL_DIR/deploy"
            DEPLOY_SCRIPT="$INSTALL_DIR/deploy/vps-deploy.sh"
            if ! run_root test -f "$DEPLOY_SCRIPT" && run_root test -f "$INSTALL_DIR/vps-deploy.sh"; then
              run_root mv "$INSTALL_DIR/vps-deploy.sh" "$DEPLOY_SCRIPT"
            fi
            if ! run_root test -f "$DEPLOY_SCRIPT"; then
              echo "ERROR: deploy script not found under $INSTALL_DIR"
              run_root ls -la "$INSTALL_DIR" "$INSTALL_DIR/deploy" 2>/dev/null || true
              exit 1
            fi
            run_root chmod +x "$DEPLOY_SCRIPT"

            HEALTH_ARGS=()
            if [[ -n "${{ secrets.PRODUCTION_HEALTH_URL }}" ]]; then
              HEALTH_ARGS=(--health-url "${{ secrets.PRODUCTION_HEALTH_URL }}")
            fi

            if [[ "$(id -u)" -eq 0 ]]; then
              cd "$INSTALL_DIR"
              export BANTOO_IMAGE="$IMAGE"
              bash "$DEPLOY_SCRIPT" --image "$IMAGE" "${HEALTH_ARGS[@]}"
            else
              sudo env BANTOO_IMAGE="$IMAGE" INSTALL_DIR="$INSTALL_DIR" \
                bash -lc "cd \"$INSTALL_DIR\" && bash deploy/vps-deploy.sh --image \"$IMAGE\" ${HEALTH_ARGS[*]:-}"
            fi

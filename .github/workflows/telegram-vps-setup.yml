name: Telegram VPS Setup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure-telegram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch Telegram env on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            INSTALL_DIR="/opt/indoteknizi"
            ENV_FILE="$INSTALL_DIR/.env.production"
            TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
            TELEGRAM_WEBHOOK_SECRET='${{ secrets.TELEGRAM_WEBHOOK_SECRET }}'
            BOT_USER='${{ secrets.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}'
            BOT_USER="${BOT_USER:-bantoo_bot}"

            upsert() {
              local key="$1" val="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sudo sed -i "s|^${key}=.*|${key}=\"${val}\"|" "$ENV_FILE"
              else
                echo "${key}=\"${val}\"" | sudo tee -a "$ENV_FILE" >/dev/null
              fi
            }

            upsert TELEGRAM_BOT_TOKEN "$TELEGRAM_BOT_TOKEN"
            upsert TELEGRAM_WEBHOOK_SECRET "$TELEGRAM_WEBHOOK_SECRET"
            upsert NEXT_PUBLIC_TELEGRAM_BOT_USERNAME "$BOT_USER"

            cd "$INSTALL_DIR"
            if docker compose version >/dev/null 2>&1; then
              sudo docker compose -f docker-compose.production.yml --env-file .env.production up -d app
            else
              sudo docker-compose -f docker-compose.production.yml --env-file .env.production up -d app
            fi
            echo "App recreated with new Telegram env"

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          APP_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
        run: |
          set -euo pipefail
          BASE="${APP_URL:-https://bantoo.in/api/health}"
          BASE="${BASE%/api/health}"
          WEBHOOK_URL="${BASE}/api/telegram/webhook"
          echo "Registering webhook: $WEBHOOK_URL"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg url "$WEBHOOK_URL" \
              --arg secret "$TELEGRAM_WEBHOOK_SECRET" \
              '{url: $url, allowed_updates: ["message"], secret_token: $secret}')"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq .
